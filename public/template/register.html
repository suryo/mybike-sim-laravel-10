<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register – MyBike Pro Template</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 2rem;
                background-image:
                    radial-gradient(
                        circle at 70% 20%,
                        rgba(129, 140, 248, 0.1) 0%,
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 30% 80%,
                        rgba(56, 189, 248, 0.08) 0%,
                        transparent 50%
                    );
            }
            .auth-card {
                width: 100%;
                max-width: 480px;
            }
            .auth-card .logo {
                display: block;
                text-align: center;
                font-size: 2rem;
                font-weight: 800;
                margin-bottom: 0.5rem;
                text-decoration: none;
            }
            .form-group {
                margin-bottom: 1.25rem;
            }
        </style>
    </head>
    <body>
        <div class="auth-card card">
            <a href="index.html" class="logo gradient-text">MyBike Pro</a>
            <p
                style="
                    text-align: center;
                    color: var(--text-secondary);
                    font-size: 0.9rem;
                    margin-bottom: 2rem;
                "
            >
                Create your account
            </p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Ahmad Pratama"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Min. 8 characters"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="password_confirmation">Confirm Password</label>
                    <input
                        type="password"
                        id="password_confirmation"
                        name="password_confirmation"
                        placeholder="Repeat your password"
                        required
                    />
                </div>
                <button
                    type="submit"
                    class="btn btn-primary"
                    style="
                        width: 100%;
                        justify-content: center;
                        padding: 0.9rem;
                        margin-top: 0.5rem;
                    "
                >
                    Create Account →
                </button>
            </form>
            <p
                style="
                    text-align: center;
                    font-size: 0.85rem;
                    color: var(--text-secondary);
                    margin-top: 1.5rem;
                "
            >
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </div>
        <script src="js/main.js"></script>
    </body>
</html>
