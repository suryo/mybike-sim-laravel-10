<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login – MyBike Pro Template</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background-image:
                    radial-gradient(
                        circle at 30% 20%,
                        rgba(56, 189, 248, 0.1) 0%,
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 70% 80%,
                        rgba(129, 140, 248, 0.08) 0%,
                        transparent 50%
                    );
            }
            .auth-card {
                width: 100%;
                max-width: 420px;
            }
            .auth-card .logo {
                display: block;
                text-align: center;
                font-size: 2rem;
                font-weight: 800;
                margin-bottom: 0.5rem;
                text-decoration: none;
            }
            .auth-card p.sub {
                text-align: center;
                color: var(--text-secondary);
                font-size: 0.9rem;
                margin-bottom: 2rem;
            }
            .form-group {
                margin-bottom: 1.25rem;
            }
            .divider {
                display: flex;
                align-items: center;
                gap: 1rem;
                margin: 1.5rem 0;
                color: var(--text-secondary);
                font-size: 0.8rem;
            }
            .divider::before,
            .divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border);
            }
        </style>
    </head>
    <body>
        <div class="auth-card card">
            <a href="index.html" class="logo gradient-text">MyBike Pro</a>
            <p class="sub">Sign in to your account</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    />
                </div>
                <div
                    style="
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 1.5rem;
                    "
                >
                    <label
                        style="
                            display: flex;
                            align-items: center;
                            gap: 0.5rem;
                            text-transform: none;
                            font-size: 0.85rem;
                            color: var(--text-secondary);
                            cursor: pointer;
                        "
                    >
                        <input type="checkbox" style="width: auto; margin: 0" />
                        Remember me
                    </label>
                    <a href="#" style="font-size: 0.85rem; color: var(--accent)"
                        >Forgot password?</a
                    >
                </div>
                <button
                    type="submit"
                    class="btn btn-primary"
                    style="
                        width: 100%;
                        justify-content: center;
                        padding: 0.9rem;
                    "
                >
                    Sign In →
                </button>
            </form>

            <div class="divider">or</div>
            <p
                style="
                    text-align: center;
                    font-size: 0.85rem;
                    color: var(--text-secondary);
                "
            >
                Don't have an account? <a href="register.html">Create one</a>
            </p>
        </div>
        <script src="js/main.js"></script>
    </body>
</html>
